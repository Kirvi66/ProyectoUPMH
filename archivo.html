<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brújula | Lista de tareas</title>
    <link rel="stylesheet" href="archivo.css">
</head>
<body>
    <main class="contenedor">
        <header class="encabezado">
            <p class="etiqueta">Organiza tu día</p>
            <h1>Lista de tareas</h1>
            <p class="descripcion">Anota lo importante, define una fecha y avanza paso a paso.</p>
        </header>

        <div class="agregar-tarea">
            <label class="campo campo-tarea" for="input-tarea">
                <span>Tarea</span>
                <input type="text" id="input-tarea" placeholder="Ejemplo: terminar la presentación">
            </label>
            <label class="campo campo-fecha" for="fecha-vencimiento">
                <span>Fecha de vencimiento</span>
                <input type="date" id="fecha-vencimiento">
            </label>
            <button id="btn-agregar">Agregar</button>
        </div>

        <p class="contador-tareas" aria-live="polite">
            Tareas terminadas: <span id="contador-terminadas">0</span>
        </p>

        <ul id="lista-tareas"></ul>

        <footer class="pie-pagina">
            <h2>Equipo de desarrollo</h2>
            <ul class="integrantes">
                <li>Pinzon Garavito Santiago</li>
                <li>Mario Daniel Alcantara Orozco</li>
                <li>Lora Lira Raul</li>
                <li>Aguilar García Irving Geovanni</li>
                <li>Tapia Lopez Emanuel Xoco</li>
            </ul>
        </footer>
    </main>

    <script src="archivo.js"></script>
</body>
</html>
